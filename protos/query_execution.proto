syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "metadata.proto";
import "query_builder.proto";

option csharp_namespace = "SqlViewer.QueryExecution";

package query_execution;

message SqlQueryRequest {
  metadata.DatabaseType database_type = 1;
  string connection_string = 2;
  string query = 3;
}

message SqlRow {
  map<string, google.protobuf.Value> fields = 1;
}

message SqlQueryResponse {
  repeated SqlRow query_result = 1;
}

message DropTableRequest {
  metadata.DatabaseType database_type = 1;
  string connection_string = 2;
  string table_name = 3;
}

service QueryExecutionService {
  rpc Query (SqlQueryRequest) returns (SqlQueryResponse);
  rpc Execute (SqlQueryRequest) returns (google.protobuf.Empty);
  rpc CreateTable (query_builder.CreateTableRequest) returns (google.protobuf.Empty);
  rpc DropTable (DropTableRequest) returns (google.protobuf.Empty);
}
