syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "SqlViewer.Etl";

package etl;

// --- Data transfer ---
message StartTransferRequest {
  string source_connection_string = 1;
  string target_connection_string = 2;
  string table_name = 3;
  string user_uid = 4;
}

message StartTransferResponse {
  string correlation_id = 1;
  google.protobuf.Timestamp created_at = 2;
  string message = 3;
}

// --- Transfer history ---
message GetTransferHistoryRequest {
  string user_uid = 1;
  optional string cursor_correlation_id = 2;
  int32 limit = 3;
}

message TransferJobGrpcDto {
  string correlation_id = 1;
  string source = 2;
  string target = 3;
  string status = 4;
  google.protobuf.Timestamp time = 5;
}

message GetTransferHistoryResponse {
  repeated TransferJobGrpcDto items = 1;
  optional string cursor_correlation_id = 2;
}

service EtlTransferService {
  rpc StartTransfer (StartTransferRequest) returns (StartTransferResponse);
  rpc GetTransferHistory (GetTransferHistoryRequest) returns (GetTransferHistoryResponse);
}
