syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "SqlViewer.Etl";

package etl;

message StartTransferRequest {
  string source_connection_string = 1;
  string target_connection_string = 2;
  string table_name = 3;
  string user_uid = 4;
}

message StartTransferResponse {
  string correlation_id = 1;
  google.protobuf.Timestamp created_at = 2;
  string message = 3;
}

message StatusSubscriptionRequest {
  string correlation_id = 1; // You can leave it blank to listen to all operations.
}

message TransferStatusUpdate {
  string correlation_id = 1;
  double progress = 2;
  string status_message = 3;
  bool is_final_state = 4;
  repeated string step_logs = 5;	// New lines in the saga log
  string status_code = 6;			// InProgress, Success, Failed
}

service EtlTransferService {
  // Launching transfer (Unary)
  rpc StartTransfer (StartTransferRequest) returns (StartTransferResponse);

  // Streaming statuses and logs (Server Streaming)
  // The client subscribes and receives updates as they appear in Kafka/Redis
  rpc SubscribeToTransferStatus (StatusSubscriptionRequest) returns (stream TransferStatusUpdate);
}
