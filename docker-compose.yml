services:
  webapi:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
    build:
      context: .
      dockerfile: src/SqlViewer.ApiGateway/Dockerfile
    ports:
      - "5293:8080"
      - "7051:8081"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server
    profiles: ["extra-dbs"]
    ports:
      - "8123:8123"

  postgres:
    image: postgres
    profiles: ["extra-dbs"]
    ports:
      - "5432:5432"

  sqlserver:
    image: mcr.microsoft.com
    profiles: ["extra-dbs"]
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPassword123
