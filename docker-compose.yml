services:
  webapi:
    container_name: api-gateway
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key=${ENCRYPTION_KEY}
      - Jwt__Key=${JWT_KEY}
      - Jwt__ExpiryLifetimeMinutes=${JWT_LIFETIME_MINUTES}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__IssuerSigningKey=${JWT_ISSUER_KEY}
      - ConnectionStrings__MetadataConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-metadata;Port=54321;Password=${DB_PASSWORD};
      - Services__Grpc__Security=http://${GRPC_SECURITY_HOST}:${GRPC_SECURITY_PORT}
      - Services__Grpc__Metadata=http://${GRPC_METADATA_HOST}:${GRPC_METADATA_PORT}
      - Services__Grpc__QueryExecution=http://${GRPC_QUERYEXECUTION_HOST}:${GRPC_QUERYEXECUTION_PORT}
    build:
      context: .
      dockerfile: src/SqlViewer.ApiGateway/Dockerfile
    ports:
      - "5293:8080"
      - "7051:8081"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  security:
    container_name: security
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Endpoint for metrics and regular HTTP (Prometheus sends requests here)
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      # Endpoint for gRPC (API Gateway sends requests here)
      - Kestrel__Endpoints__Grpc__Url=http://+:8082
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      # Other variables
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key=${ENCRYPTION_KEY}
      - Jwt__Key=${JWT_KEY}
      - Jwt__ExpiryLifetimeMinutes=${JWT_LIFETIME_MINUTES}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__IssuerSigningKey=${JWT_ISSUER_KEY}
      - ConnectionStrings__SecurityConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-security;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.Security/Dockerfile
    ports:
      - "5274:8080"
      - "5275:8082"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  metadata:
    container_name: metadata
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Endpoint for metrics and regular HTTP (Prometheus sends requests here)
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      # Endpoint for gRPC (API Gateway sends requests here)
      - Kestrel__Endpoints__Grpc__Url=http://+:8082
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      # Other variables
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key=${ENCRYPTION_KEY}
      - Jwt__Key=${JWT_KEY}
      - Jwt__ExpiryLifetimeMinutes=${JWT_LIFETIME_MINUTES}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__IssuerSigningKey=${JWT_ISSUER_KEY}
      - ConnectionStrings__SecurityConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-security;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__MetadataConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-metadata;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__QueryExecutionConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-query;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.Metadata/Dockerfile
    ports:
      - "5100:8080"
      - "5101:8082"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  query:
    container_name: query
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Endpoint for metrics and regular HTTP (Prometheus sends requests here)
      - Kestrel__Endpoints__Http__Url=http://+:8080
      - Kestrel__Endpoints__Http__Protocols=Http1
      # Endpoint for gRPC (API Gateway sends requests here)
      - Kestrel__Endpoints__Grpc__Url=http://+:8082
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      # Other variables
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key=${ENCRYPTION_KEY}
      - ConnectionStrings__SecurityConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-security;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__MetadataConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-metadata;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__QueryExecutionConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-query;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.QueryExecution/Dockerfile
    ports:
      - "5249:8080"
      - "5250:8082"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  kafka:
    image: apache/kafka:latest
    container_name: sqlviewer-kafka
    ports:
      - "9092:9092"
    environment:
      # JVM memory settings
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
      
      # Roles (KRaft mode without Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      # Setting up networks
      # 9092 - for external clients (localhost)
      # 9094 - for internal clients inside Docker (service name)
      KAFKA_LISTENERS: PLAINTEXT://:9094,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sqlviewer-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      # Сonnect via the internal name and port
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      - kafka

  # Metrics collector
  prometheus:
    image: prom/prometheus:latest
    container_name: sqlviewer-prometheus
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # Visualization (default login/password: admin/admin)
  grafana:
    image: grafana/grafana:latest
    container_name: sqlviewer-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Request tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sqlviewer-jaeger
    ports:
      - "16686:16686" # UI interface (see tracing graphs)
      - "4317:4317"   # OTLP gRPC (for receiving data from .NET)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

  postgres:
    image: postgres
    container_name: sqlviewer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "54321:5432"

  clickhouse:
    image: clickhouse/clickhouse-server
    profiles: ["extra-dbs"]
    ports:
      - "8123:8123"

  sqlserver:
    image: mcr.microsoft.com
    profiles: ["extra-dbs"]
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPassword123
