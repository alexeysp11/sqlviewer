services:
  webapi:
    container_name: api-gateway
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key={ENCRYPTION_KEY}
      - Jwt__Key={JWT_KEY}
      - Jwt__ExpiryLifetimeMinutes={JWT_LIFETIME_MINUTES}
      - Jwt__Issuer={JWT_ISSUER}
      - Jwt__Audience={JWT_AUDIENCE}
      - Jwt__IssuerSigningKey={JWT_ISSUER_KEY}
      - ConnectionStrings__MetadataConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-metadata;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.ApiGateway/Dockerfile
    ports:
      - "5293:8080"
      - "7051:8081"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  security:
    container_name: security
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key={ENCRYPTION_KEY}
      - Jwt__Key={JWT_KEY}
      - Jwt__ExpiryLifetimeMinutes={JWT_LIFETIME_MINUTES}
      - Jwt__Issuer={JWT_ISSUER}
      - Jwt__Audience={JWT_AUDIENCE}
      - Jwt__IssuerSigningKey={JWT_ISSUER_KEY}
      - ConnectionStrings__SecurityConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-security;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.Security/Dockerfile
    ports:
      - "5274:8080"
      - "7128:8081"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  metadata:
    container_name: metadata
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key={ENCRYPTION_KEY}
      - ConnectionStrings__SecurityConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-security;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__MetadataConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-metadata;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__QueryExecutionConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-query;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.Metadata/Dockerfile
    ports:
      - "5100:8080"
      - "7026:8081"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  query:
    container_name: query
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - EncryptionSettings__Key={ENCRYPTION_KEY}
      - ConnectionStrings__SecurityConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-security;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__MetadataConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-metadata;Port=54321;Password=${DB_PASSWORD};
      - ConnectionStrings__QueryExecutionConnection=Server=${DB_HOST};Username=postgres;Database=sqlviewer-query;Port=54321;Password=${DB_PASSWORD};
    build:
      context: .
      dockerfile: src/SqlViewer.QueryExecution/Dockerfile
    ports:
      - "5249:8080"
      - "7091:8081"
    volumes:
      - ${HOST_CERT_PATH:-./certs}:/https:ro
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

  postgres:
    image: postgres
    container_name: sqlviewer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "54321:5432"

  clickhouse:
    image: clickhouse/clickhouse-server
    profiles: ["extra-dbs"]
    ports:
      - "8123:8123"

  sqlserver:
    image: mcr.microsoft.com
    profiles: ["extra-dbs"]
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPassword123
